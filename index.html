<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Memory Jar</title>
    <style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    min-height: 100%;
    background: linear-gradient(135deg, #1a1008, #2d1a08, #1a1008);
}

body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    font-family: 'Georgia', serif;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 160, 50, 0.06);
    pointer-events: none;
    z-index: -1;
}

#title {
  color: rgba(255, 220, 150, 0.9);
  font-size: 2rem;
  letter-spacing: 2px;
  margin-bottom: 8px;
  opacity: 0;
  animation: softRise 1.5s ease forwards;
}

#subtitle {
  color: rgba(255, 200, 100, 0.4);
  font-size: 0.8rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 40px;
  opacity: 0;
  animation: softRise 1.5s ease 0.3s forwards;
}

#jar {
  width: 140px;
  margin-bottom: 30px;
}

#jar-wrapper {
  position: relative;
  width: 140px;
  margin: 0 auto 30px auto;
  overflow: visible;
}

#jar-lid {
  width: 120px;
  height: 18px;
  background: rgba(255, 200, 100, 0.3);
  border-radius: 6px 6px 0 0;
  border: 2px solid rgba(255, 200, 100, 0.5);
  margin: 0 auto;
  transform-origin: bottom center;
  transition: transform 0.4s ease;
}

#jar-lid.open {
  transform: rotate(-40deg) translateY(-10px);
}

#jar-body {
  width: 140px;
  height: 160px;
  background: rgba(255, 220, 150, 0.08);
  border: 2px solid rgba(255, 200, 100, 0.3);
  border-radius: 10px 10px 20px 20px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 10px;
  overflow: hidden;
}

#papers {
  display: flex;
  gap: 4px;
  align-items: flex-end;
}

.paper {
  width: 18px;
  height: 30px;
  border-radius: 3px 3px 0 0;
  opacity: 0.7;
}

.paper:nth-child(1) { background: #f9e4b7; height: 35px; transform: rotate(-8deg); }
.paper:nth-child(2) { background: #f7d9c4; height: 28px; transform: rotate(3deg); }
.paper:nth-child(3) { background: #fce8c3; height: 40px; transform: rotate(-2deg); }
.paper:nth-child(4) { background: #f9e4b7; height: 25px; transform: rotate(6deg); }
.paper:nth-child(5) { background: #f7d9c4; height: 33px; transform: rotate(-5deg); }

#revealBtn {
  padding: 14px 36px;
  font-size: 1rem;
  background: transparent;
  color: rgba(255, 220, 150, 0.9);
  border: 2px solid rgba(255, 200, 100, 0.4);
  border-radius: 30px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.3s ease;
  margin-bottom: 30px;
}

#revealBtn:hover {
  background: rgba(255, 200, 100, 0.1);
  box-shadow: 0 0 20px rgba(255, 200, 100, 0.2);
}

#memory-card {
  display: none;
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  background: #fffef0;
  color: #3a2a10;
  padding: 24px 32px;
  border-radius: 4px;
  width: 300px;
  margin-left: 0;
  text-align: center;
  font-size: 1rem;
  line-height: 1.8;
  box-shadow: 3px 3px 12px rgba(0,0,0,0.3), inset 0 0 40px rgba(255,240,180,0.3);
  transform-origin: bottom center;
  z-index: 10;
}

@keyframes unfurl {
  0%   { opacity: 0; transform: translateX(-50%) translateY(100px) scaleY(0.05); }
  40%  { opacity: 1; transform: translateX(-50%) translateY(-20px) scaleY(0.5); }
  70%  { transform: translateX(-50%) translateY(30px) scaleY(1.05); }
  100% { transform: translateX(-50%) translateY(40px) scaleY(1); }
}

@keyframes softRise {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

    </style>
  </head>
  <body>

<h1 id="title">our memory jar 🫙</h1>
<p id="subtitle">a small piece of us, one memory at a time</p>

<div id="jar-wrapper">
  <div id="jar">
    <div id="jar-lid"></div>
      <div id="jar-body">
          <div id="papers">
              <div class="paper"></div>
              <div class="paper"></div>
              <div class="paper"></div>                        
              <div class="paper"></div>            
              <div class="paper"></div>            
          </div>
      </div>
  </div>



  <div id="memory-card">
      <p id="memory-text">memory goes here</p>
  </div>
</div>

<button id="revealBtn">reach in 🤍</button>
    <script>

      const memories = [
        "For the next 24 days, I want you to open this page at midnight and I hope it'll remind you of some of the great times we've had. For today, I want you to remember our first I love you",
        "us saying the same thing at the same time",
        "sleeping together for the first time",
        "first time holding hands on Turtle Lake",
        "Turtle Lake, ice, both of us almost slipping and making ourselves look stupid",
        "the conversations when our parents found out we were dating",
        "the deeper talks where we fully connect and understand each other",
        "the first 15 minute hang out",
        "loyi momade gogi",
        "when I was too scared to touch your thigh and was rubbing your knee instead",
        "before our first kiss, when I accidentally kissed your lower lip",
        "your legs shaking on my head",
        "the trip to Batumi",
        "our first burrito",
        "our first shawarma together",
        "the foggy drive back from Tskhvarichamia",
        "that first time ;)",
        "you and my sister meeting each other for the first time",
        "our first concert, KANYE!!!!",
        "kissing you goodnight",
        "the first time you fell asleep on me in the car",
        "my first visit to Rustavi",
        "when you were saying you forgot how to kiss ;P",
        "Our first kiss",
        "Happy Anniversary to the most beautiful girl alive 🤍 I love you"
      ];

      const first = memories[0];
      const last = memories[memories.length - 1];
      const middle = memories.slice(1, memories.length - 1);

      function shuffle(arr) {
        return arr.sort(() => Math.random() - 0.5);
      }

      function getState() {
        return JSON.parse(localStorage.getItem("jarState")) || {
          seen: [],
          lastPull: null,
          finished: false
        };
      }

      function saveState(state) {
        localStorage.setItem("jarState", JSON.stringify(state));
      }

      function canPull(lastPull) {
        if (!lastPull) return true;
        const diff = Date.now() - lastPull;
        return diff >= 24 * 60 * 60 * 1000;
      }

      function timeUntilNext(lastPull) {
        const diff = 24 * 60 * 60 * 1000 - (Date.now() - lastPull);
        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        return `${h}h ${m}m ${s}s`;
      }

      function getNextMemory(state) {
        if (state.seen.length === 0) return first;
        const remaining = middle.filter(m => !state.seen.includes(m));
        if (remaining.length === 0) return last;
        return shuffle(remaining)[0];
      }

      function updateCountdown(lastPull) {
        const btn = document.getElementById("revealBtn");
        if (canPull(lastPull)) {
          btn.textContent = "reach in 🤍";
          btn.disabled = false;
          clearInterval(window.countdownTimer);
          return;
        }
        btn.disabled = true;
        btn.textContent = "come back in " + timeUntilNext(lastPull);
        window.countdownTimer = setInterval(() => {
          if (canPull(lastPull)) {
            btn.textContent = "reach in 🤍";
            btn.disabled = false;
            clearInterval(window.countdownTimer);            
          } else {
            btn.textContent = "come back in " + timeUntilNext(lastPull);
          }
        }, 1000);
      }

      function reveal() {
        const state = getState();

        if (!canPull(state.lastPull)) return;
        if (state.finished) {
          document.getElementById("memory-text").textContent = "you've read them all, my love 🤍";
          document.getElementById("memory-card").style.display = "block";
          return;
        }

        const memory = getNextMemory(state);
        state.seen.push(memory);
        state.lastPull = Date.now();

        if (memory === last) state.finished = true;

        saveState(state);

        const card = document.getElementById("memory-card");
        card.style.display = "none";
        card.style.animation = "none";

        setTimeout(() => {
          document.getElementById("jar-lid").classList.add("open");
        }, 0);

        setTimeout(() => {
          document.getElementById("memory-text").textContent = memory;
          card.style.display = "block";
          card.style.animation = "unfurl 1.2s ease forwards";
        }, 400);


      
        updateCountdown(state.lastPull);
      }

      document.getElementById("revealBtn").addEventListener("click", reveal);

      const initialState = getState();
      updateCountdown(initialState.lastPull);
 


    </script>
  </body>
</html>
